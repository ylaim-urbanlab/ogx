<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse — OpenGraphXplorer</title>
    <style>
      :root {
        --bg: #1a1d23;
        --fg: #e8e6e1;
        --muted: #8a8794;
        --line: rgba(255, 255, 255, 0.08);
        --accent: #7eb8da;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        flex-shrink: 0;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 12px;
      }
      header .path {
        font-size: 12px;
        color: var(--muted);
        word-break: break-all;
        flex: 1 1 200px;
      }
      header button,
      header a.btn {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--fg);
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      header button:hover,
      header a.btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      main {
        flex: 1;
        overflow: auto;
        padding: 12px 14px 20px;
      }
      .err {
        color: #f0a8a8;
        font-size: 13px;
      }
      pre.text-preview {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, Consolas, monospace;
      }
      .img-wrap {
        text-align: center;
      }
      .img-wrap img {
        max-width: 100%;
        max-height: calc(100vh - 120px);
        object-fit: contain;
        border-radius: 8px;
      }
      table.detail {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      table.detail th,
      table.detail td {
        text-align: left;
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
      }
      table.detail th {
        color: var(--muted);
        font-weight: 600;
      }
      table.detail tr {
        cursor: pointer;
      }
      table.detail tr:hover td {
        background: rgba(255, 255, 255, 0.04);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }
      .grid .tile {
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.25);
        cursor: pointer;
        transition: border-color 0.15s ease;
      }
      .grid .tile:hover {
        border-color: rgba(126, 184, 218, 0.45);
      }
      .grid .tile img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        display: block;
        background: #0f1114;
      }
      .grid .tile .cap {
        font-size: 10px;
        padding: 6px 8px;
        color: var(--muted);
        word-break: break-all;
      }
      .grid .tile.placeholder .ph {
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: var(--muted);
      }
      h2.section {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin: 0 0 10px;
      }
      footer {
        flex-shrink: 0;
        padding: 8px 14px;
        font-size: 10px;
        color: var(--muted);
        border-top: 1px solid var(--line);
      }
    </style>
  </head>
  <body>
    <header id="hdr">
      <span class="path" id="pathLabel"></span>
      <span id="actions"></span>
    </header>
    <main id="main"></main>
    <footer>OpenGraphXplorer browse tab · opens in a separate window</footer>
    <script src="./browse-tab.js"></script>
  </body>
</html>
